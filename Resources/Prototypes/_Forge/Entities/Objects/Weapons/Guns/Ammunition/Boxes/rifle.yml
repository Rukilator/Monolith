#region base .20
- type: entity
  id: ForgeBaseAmmunitionBoxRifle20
  parent: ForgeBaseAmmunitionBox
  name: ammunition box (.20 rifle)
  abstract: true
  components:
  - type: BallisticAmmoProvider
    whitelist:
      tags:
        - ForgeCartridgeRifle20
    capacity: 60
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/Ammunition/Boxes/rifle.rsi

