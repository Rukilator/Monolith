- type: entity
  id: BaseMagazineRifle
  name: "magazine (.20 rifle)"
  parent: [ BaseItem, BaseC1Contraband, RecyclableItemSteelTiny ] # Frontier: BaseSecurityContraband<BaseC1Contraband, added RecyclableItemSteelTiny
  abstract: true
  components:
  - type: Tag
    tags:
      - MagazineRifle
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeRifle
    capacity: 25
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Magazine/Rifle/rifle_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

- type: entity
  id: BaseMagazineRifle45
  name: магазин (.45 магнум)
  parent: [ BaseC1Contraband, RecyclableItemSteelTiny, BaseMagazineRifle ]
  abstract: true
  components:
  - type: Tag
    tags:
      - MagazineRifle45
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - ForgeCartridgePistol45
    proto: ForgeCartridgePistol45
    capacity: 20
  - type: Sprite
    sprite: Forge/Objects/Weapons/Guns/Ammunition/Magazine/45magazine.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-6
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 7
    zeroVisible: false
  - type: Item
    sprite: Forge/Objects/Weapons/Guns/Ammunition/Magazine/45magazine.rsi
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag

