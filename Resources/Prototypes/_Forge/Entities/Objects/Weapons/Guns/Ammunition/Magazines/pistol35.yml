    tags:
      - ForgeMagazineSubMachineGunTopMountedPistol35
  - type: BallisticAmmoProvider
    mayTransfer: true
    proto: ForgeCartridgeRifle25
    whitelist:
      tags:
      - ForgeCartridgeRifle25
    capacity: 30
