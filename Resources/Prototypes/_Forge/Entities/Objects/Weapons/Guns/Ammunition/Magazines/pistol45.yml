- type: entity
  id: BaseMagazineMagnum
  name: pistol magazine (.45 magnum)
  parent: [ BaseMagazinePistol, BaseC1Contraband, RecyclableItemSteelTiny ] # Frontier: BaseSecurityContraband<BaseC1Contraband, added RecyclableItemSteelTiny
  abstract: true
  components:
  - type: Tag
    tags:
      - MagazineMagnum
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeMagnum
    capacity: 7

# WizDen
#region base mags .45
- type: entity
  id: ForgeBaseMagazinePistol45
  name: pistol magazine (.45 pistol)
  parent: [ BaseC1Contraband, BaseMagazineMagnum, RecyclableItemSteelTiny ]
  abstract: true
  components:
  - type: Tag
    tags:
      - ForgeMagazinePistol45
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - ForgeCartridgePistol45
    capacity: 8
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/Ammunition/Magazine/Pistol35/pistol_mag.rsi
    layers:
    - state: base
      color: "#666666"
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    sprite: _NF/Objects/Weapons/Guns/Ammunition/Magazine/Pistol35/pistol_mag.rsi
    inhandVisuals:
      left:
      - state: inhand-left-mag
        color: "#666666"
      right:
      - state: inhand-right-mag
        color: "#666666"

- type: entity
  id: ForgeBaseMagazinePistolSubMachineGun45
  name: smg magazine (.45 pistol)
  parent: [ BaseC1Contraband, BaseMagazineMagnum, RecyclableItemSteelTiny ]
  abstract: true
  components:
  - type: Tag
    tags:
      - ForgeMagazineSubMachineGunPistol45
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - ForgeCartridgePistol45
    capacity: 25
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/Ammunition/Magazine/Pistol45/smg_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false
  - type: Item
    sprite: _NF/Objects/Weapons/Guns/Ammunition/Magazine/Pistol45/smg_mag.rsi
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag

