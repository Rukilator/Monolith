# WizDen
#region base .30
- type: entity
  id: BaseMagazineLightRifle
  name: "magazine (.30 rifle)"
  parent: [ BaseItem, BaseC1Contraband, RecyclableItemSteelTiny ] # Frontier: BaseSecurityContraband<BaseC1Contraband added RecyclableItemSteelTiny
  abstract: true
  components:
  - type: Tag
    tags:
      - MagazineLightRifle
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeLightRifle
    # proto: CartridgeLightRifle # Frontier
    capacity: 30
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Magazine/LightRifle/light_rifle_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance


- type: entity
  id: ForgeBaseMagazineRifle30
  name: magazine (.30 rifle)
  parent: [ BaseC1Contraband, RecyclableItemSteelTiny, BaseMagazineLightRifle ]
  abstract: true
  components:
  - type: Tag
    tags:
      - ForgeMagazineRifle30 # TODO: make it make sense, change the tags
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - ForgeCartridgeRifle30
    proto: ForgeCartridgeRifle30
    capacity: 30
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/Ammunition/Magazine/Rifle/rifle30_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-7
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 8
    zeroVisible: false
  - type: Item
    sprite: _NF/Objects/Weapons/Guns/Ammunition/Magazine/Rifle/rifle30_mag.rsi
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag

- type: entity
  id: ForgeBaseMagazineLowCapacityRifle30
  name: low cap magazine (.30 rifle)
  parent: ForgeBaseMagazineRifle30
  abstract: true
  components:
  - type: Tag
    tags:
      - ForgeMagazineLowCapacityRifle30
  - type: Item
    size: Tiny
    sprite: _NF/Objects/Weapons/Guns/Ammunition/Magazine/Rifle/rifle30_low_cap_mag.rsi
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag
  - type: BallisticAmmoProvider
    capacity: 15
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/Ammunition/Magazine/Rifle/rifle30_low_cap_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-6
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    steps: 7

#region .30 magazines
- type: entity
  id: ForgeMagazineRifle30Empty
  name: magazine (.30 rifle, any)
  parent: ForgeBaseMagazineRifle30
  suffix: empty
  components:
  - type: BallisticAmmoProvider
    proto: null

- type: entity
  id: ForgeMagazineRifle30
  name: magazine (.30 rifle)
  parent: ForgeBaseMagazineRifle30
  components:
  - type: BallisticAmmoProvider
    proto: ForgeCartridgeRifle30

- type: entity
  id: ForgeMagazineRifle30Overpressure
  name: magazine (.30 rifle, overpressure)
  parent: ForgeBaseMagazineRifle30
  components:
  - type: BallisticAmmoProvider
    proto: ForgeCartridgeRifle30Overpressure
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: decal-01
      color: "#ff8d00"
    - state: mag-7
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#ff8d00"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#ff8d00"

