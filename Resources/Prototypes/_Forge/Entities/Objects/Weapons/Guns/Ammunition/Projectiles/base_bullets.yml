#region ForgeBase
- type: entity # Forge-change remove bullet-trace state, color, and tracer
  id: ForgeBaseBullet
  parent: BaseBullet
  abstract: true
  components:
  - type: Sprite
    noRot: false
    sprite: Forge/Objects/Weapons/Guns/Ammunition/Projectiles/bullets.rsi
    layers:
    - state: bullet
      shader: unshaded

- type: entity
  id: ForgeBaseBulletTrigger
  parent: BaseBulletTrigger
  abstract: true
  components:
  - type: Sprite
    noRot: false
    sprite: Forge/Objects/Weapons/Guns/Ammunition/Projectiles/bullets.rsi
    layers:
    - state: bullet
      shader: unshaded

- type: entity
  id: ForgeBasePellet
  parent: ForgeBaseBullet
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: pellet
      shader: unshaded
    - state: pellet-trace
      shader: unshaded

#region Bullets
- type: entity
  id: ForgeBaseBulletOverpressure
  parent: ForgeBaseBullet
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: bullet
      shader: unshaded

- type: entity
  id: ForgeBaseBulletIncendiary
  parent: ForgeBaseBullet
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: bullet
      shader: unshaded
  - type: PointLight
    enabled: true
    color: "#ff4300"
    radius: 1.1
    energy: 3.0
  - type: IgniteOnCollide
    fireStacks: 0.25
  - type: IgnitionSource
    ignited: true

- type: entity
  id: ForgeBaseBulletUranium
  parent: ForgeBaseBullet
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: bullet
      shader: unshaded
  - type: PointLight
    enabled: true
    color: "#9BE792"
    radius: 1.1
    energy: 3.0
- type: entity
  id: ForgeBaseBulletPractice
  parent: ForgeBaseBullet
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: bullet
      shader: unshaded

- type: entity
  id: ForgeBaseBulletEmp
  parent: ForgeBaseBulletTrigger
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: bullet
      shader: unshaded
  - type: PointLight
    enabled: true
    color: "#00ffff"
    radius: 1.1
    energy: 3.0

- type: entity
  id: ForgeBaseBulletRubber
  parent: ForgeBaseBullet
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: bullet
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Blunt: 3
    soundHit:
      path: /Audio/Weapons/Guns/Hits/snap.ogg
  - type: StaminaDamageOnCollide
    damage: 15

- type: entity
  id: ForgeBaseBulletExplosive
  parent: ForgeBaseBulletTrigger
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: bullet
      shader: unshaded
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    maxIntensity: 2
    intensitySlope: 1
    totalIntensity: 6
    maxTileBreak: 0
  - type: PointLight
    enabled: true
    color: "#ffff00FF"
    radius: 1.1
    energy: 3.0

- type: entity
  id: ForgeBaseBulletAP
  parent: ForgeBaseBullet
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: bullet
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Piercing: 8
    ignoreResistances: true

#region AntiMateriel
- type: entity
  id: ForgeBaseBulletAntiMateriel
  parent: ForgeBaseBullet
  abstract: true
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 30
        Structural: 200
    penetrationThreshold: 360
    penetrationDamageTypeRequirement:
    - Structural

- type: entity
  id: ForgeBaseBulletAntiMaterielRubber
  parent: ForgeBaseBulletRubber
  abstract: true
  components:
  - type: Projectile
    damage:
      types:
        Blunt: 10
  - type: StaminaDamageOnCollide
    damage: 60

#region Pellets
- type: entity
  id: ForgeBasePelletOverpressure
  parent: ForgeBaseBulletOverpressure
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: pellet
      color: "#ff8d00FF"
      shader: unshaded
    - state: pellet-trace
      color: "#ff8d00BB"
      shader: unshaded

- type: entity
  id: ForgeBasePelletIncendiary
  parent: ForgeBaseBulletIncendiary
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: pellet
      color: "#ff0000FF"
      shader: unshaded
    - state: pellet-trace
      color: "#ff0000BB"
      shader: unshaded
  - type: PointLight
    enabled: true
    color: "#ff4300"
    radius: 1.1
    energy: 3.0
  - type: IgniteOnCollide
    fireStacks: 0.25
  - type: IgnitionSource
    ignited: true

- type: entity
  id: ForgeBasePelletUranium
  parent: ForgeBaseBullet
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: pellet
      color: "#00ff00FF"
      shader: unshaded
    - state: pellet-trace
      color: "#9BE792BB"
      shader: unshaded
  - type: PointLight
    enabled: true
    color: "#9BE792"
    radius: 1.1
    energy: 1.0
- type: entity
  id: ForgeBasePelletPractice
  parent: ForgeBaseBullet
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: pellet
      color: "#ddddddFF"
      shader: unshaded
    - state: pellet-trace
      color: "#ddddddBB"
      shader: unshaded

