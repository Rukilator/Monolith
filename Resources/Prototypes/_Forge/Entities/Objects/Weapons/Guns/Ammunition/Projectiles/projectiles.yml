- type: entity
  id: ForgeBulletRocketEmp
  name: rocket
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Shock: 0
  - type: TimedDespawn
    lifetime: 15
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/Ammunition/Projectiles/projectiles2.rsi
    layers:
    - state: frag-emp
  - type: EmpOnTrigger
    range: 4
    energyConsumption: 2700000
    disableDuration: 60

- type: entity
  id: ForgeBulletCannonBallEmp
  name: shockshot
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/Ammunition/Projectiles/projectiles2.rsi
    layers:
    - state: ball-emp
    - state: ball-emp-unlit
      shader: unshaded
  - type: PointLight
    radius: 1
    color: cyan
    energy: 0.5
  - type: Projectile
    damage:
      types:
        Shock: 0
  - type: EmpOnTrigger
    range: 4
    energyConsumption: 2700000
    disableDuration: 60

- type: entity
  id: ForgeBaseBulletLaser
  name: laser bolt
  parent: BulletLaser
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    layers:
    - state: omnilaser_greyscale
      shader: unshaded
      color: red
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.2,0.1,0.2"
        hard: false
        mask:
        - Opaque

