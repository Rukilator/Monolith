#region frame
- type: entity
  id: ForgeBaseWeaponFrameEnergyPistol
  parent: [ ForgeBaseWeaponEncumbrancePistol, BaseWeaponBatterySmall ]
  suffix: Frontier
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Appearance
  - type: Gun
    projectileSpeed: 30
    minAngle: 2.1
    maxAngle: 10.5
    angleIncrease: 0.6
    angleDecay: 3
    fireRate: 3
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: Battery # Default: 16 shots with 60 fireCost
    maxCharge: 960
    startingCharge: 960
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 3 # Default recharge rate: 1 shot per 20 seconds with 60 fireCost
  - type: StaticPrice
    price: 250

#region manufacturer
- type: entity
  id: ForgeBaseWeaponFrameEnergyPistolNanotrasen
  parent: ForgeBaseWeaponFrameEnergyPistol
  abstract: true
  components:
  - type: Gun
    minAngle: 2.4
    maxAngle: 12
    angleIncrease: 0.8
    angleDecay: 2.7
    fireRate: 2.6

- type: entity
  id: ForgeBaseWeaponFrameEnergyPistolFrontierGunsmith
  parent: ForgeBaseWeaponFrameEnergyPistol
  abstract: true
  components:
  - type: Gun
    minAngle: 3
    maxAngle: 15
    angleIncrease: 1.2
    angleDecay: 3.8
    fireRate: 2

#region chamber
- type: entity
  id: ForgeBaseWeaponEnergyPistolFireModes
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mode-lethal
      map: ["Firemode"]
      shader: unshaded
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Gun
    examineCaliber: gun-examine-energybolt-low-disabler-pistol
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser.ogg
  - type: ProjectileBatteryAmmoProvider
    proto: ForgeBulletLaserLow
    fireCost: 60
  - type: EnergyGun
    fireModes:
    - proto: ForgeBulletDisabler
      fireCost: 60
      name: disable
      state: disabler
    - proto: ForgeBulletLaserLow
      fireCost: 60
      name: kill
      state: lethal
  - type: GenericVisualizer
    visuals:
      enum.EnergyGunFireModeVisuals.State:
        Firemode:
          Disabler: { state: mode-disabler }
          Lethal: { state: mode-lethal }

- type: entity
  id: ForgeBaseWeaponEnergyPistolDisabler
  abstract: true
  components:
  - type: Gun
    examineCaliber: gun-examine-energybolt-disabler-pistol
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/taser2.ogg
  - type: ProjectileBatteryAmmoProvider
    proto: ForgeBulletDisabler
    fireCost: 60

- type: entity
  id: ForgeBaseWeaponEnergyGunPractice
  abstract: true
  components:
  - type: Gun
    examineCaliber: gun-examine-energybolt-disabler-practice
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/taser2.ogg
  - type: ProjectileBatteryAmmoProvider
    proto: ForgeBulletLaserPractice
    fireCost: 30

- type: entity
  id: ForgeBaseWeaponEnergyPistolHitScan
  abstract: true
  components:
  - type: Gun
    examineCaliber: gun-examine-hitscan-low
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser.ogg
  - type: HitscanBatteryAmmoProvider
    proto: ForgeRedLightLaser
    fireCost: 60

- type: entity
  id: ForgeBaseWeaponEnergyPistolHitScanPulse
  abstract: true
  components:
  - type: Gun
    examineCaliber: gun-examine-pulse-low
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser3.ogg
    projectileSpeed: 50
  - type: ProjectileBatteryAmmoProvider # Corvax-Forge: Weaponary update
    proto: ForgeBulletPulse
    fireCost: 60
