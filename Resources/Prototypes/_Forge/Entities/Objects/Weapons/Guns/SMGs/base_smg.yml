        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist: &mag25TopMountedWhitelist
          tags:
            - ForgeMagazineSubMachineGunTopMountedPistol35
      gun_chamber: *chamber25Standard

- type: entity
  id: ForgeBaseWeaponSubMachineGunChamber35TopMountedRubber
  parent: ForgeBaseWeaponSubMachineGunChamber35TopMounted
  abstract: true
  components:
