#region chamber
- type: entity
  id: ForgeBaseWeaponSubMachineGunChamber
  abstract: true
  components:
  - type: Gun
    examineCaliber: gun-examine-caliber-25
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/smg.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/smg_cock.ogg
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot

- type: entity
  id: ForgeBaseWeaponSubMachineGunChamber35
  parent: ForgeBaseWeaponSubMachineGunChamber
  abstract: true
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: ForgeMagazineSubMachineGun35
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist: &mag25Whitelist
          tags:
            - ForgeMagazineSubMachineGunPistol35
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber: &chamber25Standard
        name: Chamber
        startingItem: ForgeCartridgeRifle25
        priority: 1
        whitelist:
          tags:
            - ForgeCartridgeRifle25

- type: entity
  id: ForgeBaseWeaponSubMachineGunChamber35Rubber
  parent: ForgeBaseWeaponSubMachineGunChamber35
  abstract: true
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: ForgeMagazineSubMachineGun35Rubber
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist: *mag25Whitelist
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber: &chamber25Rubber
        name: Chamber
        startingItem: ForgeCartridgeRifle25Rubber
        priority: 1
        whitelist:
          tags:
            - ForgeCartridgeRifle25

- type: entity
  id: ForgeBaseWeaponSubMachineGunChamber35TopMounted
  parent: ForgeBaseWeaponSubMachineGunChamber
  abstract: true
  components:
  - type: ItemSlots
    slots:
