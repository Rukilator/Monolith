#region frame
- type: entity
  id: ForgeBaseWeaponFrameSubMachineGun
  parent: [ ForgeBaseWeaponEncumbranceSubMachineGun, ForgeBaseItemWeaponGunMagazineFed ]
  name: submachine gun
  abstract: true
  components:
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -0.8
    maxAngle: -4
  - type: Gun
    projectileSpeed: 22.5
    minAngle: 3.7
    maxAngle: 18.5
    angleIncrease: 1
    angleDecay: 5
    fireRate: 6
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
  - type: StaticPrice
    price: 350

#region manufacturer
- type: entity
  id: ForgeBaseWeaponFrameSubMachineGunNanotrasen
  parent: ForgeBaseWeaponFrameSubMachineGun
  abstract: true
  components:
  - type: Gun
