#region base weapon
- type: entity
  id: ForgeBaseItemWeaponGun
  parent: [ BaseC1Contraband, BaseItem ]
  suffix: Frontier
  abstract: true
  components:
  - type: Sprite
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
  - type: Gun
  - type: AmmoCounter
  - type: Appearance
  - type: StaticPrice
    price: 500

- type: entity
  id: ForgeBaseItemWeaponGunMagazineFed
  parent: ForgeBaseItemWeaponGun
  abstract: true
  components:
  - type: Sprite
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true

#region Encumbrance
# Pistols / Revolvers
- type: entity
  id: ForgeBaseWeaponEncumbrancePistol
  abstract: true
  components:
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
  - type: Clothing
    quickEquip: false
    slots:
    - Belt
    - suitStorage
  - type: Tag
    tags:
    - Sidearm

- type: entity
  id: ForgeBaseWeaponEncumbranceMachinePistol
  parent: ForgeBaseWeaponEncumbrancePistol
  abstract: true
  components:
  - type: Item
    shape:
    - 0,0,2,0
    - 0,1,0,1

# SMGs
- type: entity
  id: ForgeBaseWeaponEncumbranceSubMachineGun
