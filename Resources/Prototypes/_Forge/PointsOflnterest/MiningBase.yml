- type: pointOfInterest
  id: MiningBase
  parent: BasePOI
  name: 'База Шахтёров'
  minimumDistance: 1250 # Forge-change: 441 - i think spawnpoints its is an organized crime group, and they should be together.
  maximumDistance: 2400 # Forge-change: 441 - long distances
  spawnGroup: Required
  gridPath: /Maps/_Forge/POI/MiningBase.yml
  addComponents:
  - type: IFF
    color: "#a68614"
  - type: ProtectedGrid
    preventArtifactTriggers: True
    preventExplosions: True
    preventEmpEvents: True
    preventRCDUse: True
    preventFloorPlacement: True
    preventFloorRemoval: True
    killHostileMobs: True
    noGridCollision: True

- type: gameMap
  id: MiningBase
  mapName: 'База Шахтёров'
  mapPath: /Maps/_Forge/POI/MiningBase.yml
  minPlayers: 0
  stations:
    MiningBase:
      stationProto: RecordsFrontierOutpost
      components:
        - type: StationNameSetup
          mapNameTemplate: 'База Шахтёров'
        - type: ExtraStationInformation
          iconPath: /Textures/Forge/Logo/Icon/pickaxe.png
          stationSubtext: 'frontier-lobby-mining-subtext'
          stationDescription: 'frontier-lobby-mining-description'
          lobbySortOrder: 3
        - type: StationDeadDrop
          maxDeadDrops: 1 # Fewer here, players start here.
